  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

older-val=\"{{ true }}\">\n    <div data-screen-label=\"Auth\" style=\"min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg,#FBF8F4 0%,#F3EEE6 100%); padding:24px;\">\n      <div style=\"width:100%; max-width:420px; background:#FFFFFF; border-radius:24px; box-shadow:0 20px 60px rgba(26,38,80,0.08); padding:44px 40px;\">\n        <div style=\"display:flex; align-items:center; justify-content:center; margin-bottom:28px;\">\n          <img src=\"eb48b263-63b1-44fb-b017-02950588f16b\" alt=\"Helios\" style=\"height:42px; width:auto;\">\n        <\u002Fdiv>\n        <p style=\"text-align:center; color:#5B6472; font-size:16px; line-height:1.6; margin:0 0 32px; text-wrap:pretty;\">Your care team, connected. See updates, share documents, and message your doctor — all in one calm place.<\u002Fp>\n\n        <div style=\"display:flex; gap:6px; background:#F4F6F8; border-radius:12px; padding:4px; margin-bottom:24px;\">\n          <button sc-camel-on-click=\"{{ setLogin }}\" style=\"flex:1; border:none; border-radius:9px; padding:10px; font-size:14px; font-weight:700; cursor:pointer; background:{{ loginTabBg }}; color:{{ loginTabColor }};\">Log in<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ setSignup }}\" style=\"flex:1; border:none; border-radius:9px; padding:10px; font-size:14px; font-weight:700; cursor:pointer; background:{{ signupTabBg }}; color:{{ signupTabColor }};\">Sign up<\u002Fbutton>\n        <\u002Fdiv>\n\n        <button style=\"width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:13px; border-radius:12px; border:1px solid #E3DFD6; background:#FFFFFF; font-size:15px; font-weight:500; color:#1A2650; cursor:pointer; margin-bottom:18px;\">\n          <span style=\"width:18px; height:18px; border-radius:4px; background:conic-gradient(from 90deg,#4285F4 0 25%,#34A853 25% 50%,#FBBC05 50% 75%,#EA4335 75% 100%); display:inline-block;\"><\u002Fspan>\n          Continue with Google\n        <\u002Fbutton>\n\n        <div style=\"display:flex; align-items:center; gap:12px; margin:20px 0;\">\n          <div style=\"flex:1; height:1px; background:#EDE8DF;\"><\u002Fdiv>\n          <span style=\"font-size:12px; color:#A7A096; font-weight:500;\">OR<\u002Fspan>\n          <div style=\"flex:1; height:1px; background:#EDE8DF;\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; gap:12px; margin-bottom:22px;\">\n          <input type=\"email\" placeholder=\"Email address\" style=\"padding:13px 14px; border-radius:12px; border:1px solid #E3DFD6; font-size:15px; font-family:inherit; color:#1A2650;\">\n          <input type=\"password\" placeholder=\"Password\" style=\"padding:13px 14px; border-radius:12px; border:1px solid #E3DFD6; font-size:15px; font-family:inherit; color:#1A2650;\">\n        <\u002Fdiv>\n\n        <button sc-camel-on-click=\"{{ goOnboarding }}\" style=\"width:100%; padding:14px; border:none; border-radius:12px; background:#1A2650; color:#FFFFFF; font-size:15px; font-weight:700; cursor:pointer;\">{{ authCta }}<\u002Fbutton>\n\n        <p style=\"text-align:center; font-size:12px; color:#A7A096; margin:18px 0 0;\">Auth is stubbed for this prototype — wire to your <code>/auth/*<\u002Fcode> endpoints.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ ONBOARDING / CONSENT ============ -->\n  <sc-if value=\"{{ isOnboarding }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Onboarding &amp; Consent\" style=\"min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg,#FBF8F4 0%,#F3EEE6 100%); padding:24px;\">\n      <div style=\"width:100%; max-width:560px; background:#FFFFFF; border-radius:24px; box-shadow:0 20px 60px rgba(26,38,80,0.08); padding:48px 44px;\">\n        <div style=\"margin-bottom:8px;\">\n          <img src=\"eb48b263-63b1-44fb-b017-02950588f16b\" alt=\"Helios\" style=\"height:26px; width:auto;\">\n        <\u002Fdiv>\n        <h1 style=\"font-size:28px; color:#1A2650; margin:20px 0 16px; font-weight:700;\">Welcome, Sarah.<\u002Fh1>\n        <p style=\"font-size:16px; line-height:1.7; color:#3E4552; margin:0 0 16px; text-wrap:pretty;\">Everything you share here — documents, messages, updates — goes directly to Dr. Rossi and your care team, to help them take care of you.<\u002Fp>\n        <p style=\"font-size:16px; line-height:1.7; color:#3E4552; margin:0 0 16px; text-wrap:pretty;\">By default, a de-identified copy of your information also helps improve Helios for future patients facing similar diagnoses. You're always in control of this — you can turn it off anytime in Settings.<\u002Fp>\n        <div style=\"background:#F7F9FA; border-radius:14px; padding:18px 20px; margin:24px 0; display:flex; gap:12px; align-items:flex-start;\">\n          <span style=\"color:#1FB6C1; font-size:18px; line-height:1;\">✓<\u002Fspan>\n          <p style=\"margin:0; font-size:14px; color:#5B6472; line-height:1.6;\">Using your care data to support your treatment is required to use Helios and can't be turned off — this is how your doctor sees your records.<\u002Fp>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ goHome }}\" style=\"width:100%; padding:15px; border:none; border-radius:12px; background:#1A2650; color:#FFFFFF; font-size:15px; font-weight:700; cursor:pointer;\">Continue to your portal<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ HOME ============ -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Home / Dashboard\" style=\"min-height:100vh; background:#FBF8F4;\">\n      <nav style=\"display:flex; align-items:center; justify-content:space-between; padding:18px 40px; background:#FFFFFF; border-bottom:1px solid #EDE8DF;\">\n        <img src=\"eb48b263-63b1-44fb-b017-02950588f16b\" alt=\"Helios\" style=\"height:24px; width:auto;\">\n        <div style=\"display:flex; align-items:center; gap:32px;\">\n          <a sc-camel-on-click=\"{{ goHome }}\" style=\"font-size:14px; font-weight:700; color:#1A2650; cursor:pointer;\">Home<\u002Fa>\n          <a sc-camel-on-click=\"{{ goRecords }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">My Records<\u002Fa>\n          <a sc-camel-on-click=\"{{ goChat }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Ask Helios<\u002Fa>\n          <a sc-camel-on-click=\"{{ goMessages }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Messages<\u002Fa>\n          <a sc-camel-on-click=\"{{ goSettings }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Settings<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:16px;\">\n          <div style=\"position:relative; font-size:18px; cursor:pointer;\">🔔<span style=\"position:absolute; top:-2px; right:-2px; width:8px; height:8px; background:#1FB6C1; border-radius:50%;\"><\u002Fspan><\u002Fdiv>\n          <div style=\"width:34px; height:34px; border-radius:50%; background:#1A2650; color:#FFFFFF; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;\">SM<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fnav>\n\n      <div style=\"max-width:840px; margin:0 auto; padding:48px 24px;\">\n        <h1 style=\"font-size:32px; color:#1A2650; font-weight:700; margin:0 0 6px;\">Good afternoon, Sarah<\u002Fh1>\n        <p style=\"font-size:16px; color:#5B6472; margin:0 0 36px;\">Here's what's new since your last visit.<\u002Fp>\n\n        <div style=\"display:flex; flex-direction:column; gap:14px; margin-bottom:36px;\">\n          <div style=\"background:#FFFFFF; border-radius:16px; padding:20px 24px; box-shadow:0 4px 16px rgba(26,38,80,0.05); display:flex; align-items:center; gap:16px; cursor:pointer;\" sc-camel-on-click=\"{{ goMessages }}\">\n            <div style=\"width:40px; height:40px; border-radius:12px; background:#E7F8FA; display:flex; align-items:center; justify-content:center; font-size:18px;\">💬<\u002Fdiv>\n            <div style=\"flex:1;\">\n              <p style=\"margin:0; font-size:15px; font-weight:700; color:#1A2650;\">Dr. Rossi sent you a message<\u002Fp>\n              <p style=\"margin:2px 0 0; font-size:13px; color:#8A9099;\">Yesterday · about your recent labs<\u002Fp>\n            <\u002Fdiv>\n            <span style=\"color:#1FB6C1; font-size:18px;\">→<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:#FFFFFF; border-radius:16px; padding:20px 24px; box-shadow:0 4px 16px rgba(26,38,80,0.05); display:flex; align-items:center; gap:16px;\">\n            <div style=\"width:40px; height:40px; border-radius:12px; background:#F0EEE7; display:flex; align-items:center; justify-content:center; font-size:18px;\">📄<\u002Fdiv>\n            <div style=\"flex:1;\">\n              <p style=\"margin:0; font-size:15px; font-weight:700; color:#1A2650;\">Your last upload was processed<\u002Fp>\n              <p style=\"margin:2px 0 0; font-size:13px; color:#8A9099;\">Blood panel · added to your record on Jul 12<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n          <div sc-camel-on-click=\"{{ goUpload }}\" style=\"cursor:pointer; background:#1A2650; border-radius:20px; padding:28px; color:#FFFFFF;\">\n            <div style=\"font-size:26px; margin-bottom:14px;\">📤<\u002Fdiv>\n            <p style=\"margin:0 0 6px; font-size:17px; font-weight:700;\">Upload a document<\u002Fp>\n            <p style=\"margin:0; font-size:13px; color:#B7BFDC; line-height:1.5;\">Share a lab result, imaging report, or discharge letter with your care team.<\u002Fp>\n          <\u002Fdiv>\n          <div sc-camel-on-click=\"{{ goMessages }}\" style=\"cursor:pointer; background:#FFFFFF; border:1px solid #EDE8DF; border-radius:20px; padding:28px;\">\n            <div style=\"font-size:26px; margin-bottom:14px;\">✉️<\u002Fdiv>\n            <p style=\"margin:0 0 6px; font-size:17px; font-weight:700; color:#1A2650;\">Message your doctor<\u002Fp>\n            <p style=\"margin:0; font-size:13px; color:#5B6472; line-height:1.5;\">Send an update or a question — Dr. Rossi will reply when they're able to.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ ASK HELIOS (patient chat) ============ -->\n  <sc-if value=\"{{ isChat }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Ask Helios\" style=\"min-height:100vh; background:#FBF8F4; display:flex; flex-direction:column;\">\n      <nav style=\"display:flex; align-items:center; justify-content:space-between; padding:18px 40px; background:#FFFFFF; border-bottom:1px solid #EDE8DF;\">\n        <img src=\"eb48b263-63b1-44fb-b017-02950588f16b\" alt=\"Helios\" style=\"height:24px; width:auto;\">\n        <div style=\"display:flex; align-items:center; gap:32px;\">\n          <a sc-camel-on-click=\"{{ goHome }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Home<\u002Fa>\n          <a sc-camel-on-click=\"{{ goRecords }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">My Records<\u002Fa>\n          <a sc-camel-on-click=\"{{ goChat }}\" style=\"font-size:14px; font-weight:700; color:#1A2650; cursor:pointer;\">Ask Helios<\u002Fa>\n          <a sc-camel-on-click=\"{{ goMessages }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Messages<\u002Fa>\n          <a sc-camel-on-click=\"{{ goSettings }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Settings<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"width:34px; height:34px; border-radius:50%; background:#1A2650; color:#FFFFFF; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;\">SM<\u002Fdiv>\n      <\u002Fnav>\n\n      <div style=\"max-width:680px; margin:0 auto; padding:32px 24px 24px; width:100%; box-sizing:border-box; flex:1; display:flex; flex-direction:column;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:6px;\">\n          <span style=\"display:inline-block; width:9px; height:9px; background:#1FB6C1; transform:rotate(45deg); border-radius:2px;\"><\u002Fspan>\n          <h1 style=\"font-size:22px; color:#1A2650; font-weight:700; margin:0;\">Ask Helios<\u002Fh1>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; color:#8A9099; margin:0 0 24px; line-height:1.6;\">General questions, grounded in medical literature and your record. For anything about symptoms or how you're feeling, Helios connects you straight to Dr. Rossi instead of guessing.<\u002Fp>\n\n        <div style=\"display:flex; flex-direction:column; gap:16px; margin-bottom:20px; flex:1;\">\n          <sc-for list=\"{{ chatMessages }}\" as=\"m\" hint-placeholder-count=\"4\">\n            <sc-if value=\"{{ m.isUser }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; justify-content:flex-end;\">\n                <div style=\"max-width:72%; padding:13px 18px; border-radius:16px; background:#1A2650; color:#FFFFFF;\">\n                  <p style=\"margin:0; font-size:14px; line-height:1.6;\">{{ m.text }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ m.isInfo }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"max-width:82%; background:#FFFFFF; border-radius:16px; padding:16px 20px; box-shadow:0 2px 10px rgba(26,38,80,0.05);\">\n                <sc-if value=\"{{ m.dataUsed }}\" hint-placeholder-val=\"{{ false }}\">\n                  <p style=\"margin:0 0 8px; font-size:12px; color:#8A9099; font-style:italic;\">{{ m.dataUsed }}<\u002Fp>\n                <\u002Fsc-if>\n                <p style=\"margin:0 0 10px; font-size:14px; line-height:1.6; color:#1A2650;\">{{ m.text }}<\u002Fp>\n                <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:#128089; background:#E7F8FA; padding:4px 10px; border-radius:20px;\">📚 {{ m.source }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ m.isRedirect }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"max-width:82%; background:#FDF3E2; border:1px solid #F3DFB0; border-radius:16px; padding:18px 20px;\">\n                <p style=\"margin:0 0 4px; font-size:11px; font-weight:700; color:#A9701F; text-transform:uppercase; letter-spacing:0.05em;\">Best for your doctor<\u002Fp>\n                <p style=\"margin:0 0 14px; font-size:14px; line-height:1.6; color:#5B4522;\">{{ m.text }}<\u002Fp>\n                <button sc-camel-on-click=\"{{ m.onStartMessage }}\" style=\"border:none; background:#1A2650; color:#FFFFFF; font-size:13px; font-weight:700; padding:10px 18px; border-radius:10px; cursor:pointer;\">Start message to Dr. Rossi<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ m.isEmergency }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"max-width:82%; background:#1A2650; border-radius:16px; padding:18px 20px;\">\n                <p style=\"margin:0 0 4px; font-size:11px; font-weight:700; color:#FF9E7D; text-transform:uppercase; letter-spacing:0.05em;\">This may need urgent help<\u002Fp>\n                <p style=\"margin:0 0 12px; font-size:14px; line-height:1.6; color:#FFFFFF;\">{{ m.text }}<\u002Fp>\n                <div style=\"display:flex; flex-direction:column; gap:8px;\">\n                  <p style=\"margin:0; font-size:13px; font-weight:700; color:#FFFFFF;\">Call 911 (or your local emergency number) now.<\u002Fp>\n                  <p style=\"margin:0; font-size:13px; color:#C6CBE0;\">In crisis and need to talk? Call or text 988 (Suicide &amp; Crisis Lifeline).<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:10px; background:#FFFFFF; border:1px solid #EDE8DF; border-radius:16px; padding:8px 8px 8px 18px; margin-top:auto;\">\n          <input value=\"{{ chatInput }}\" sc-camel-on-change=\"{{ updateChatInput }}\" placeholder=\"Ask a general question…\" style=\"flex:1; border:none; font-size:14px; font-family:inherit; color:#1A2650; outline:none; background:transparent;\">\n          <button sc-camel-on-click=\"{{ sendChatMessage }}\" style=\"border:none; background:#1FB6C1; color:#FFFFFF; font-size:13px; font-weight:700; padding:10px 20px; border-radius:12px; cursor:pointer;\">Send<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ MY RECORDS ============ -->\n  <sc-if value=\"{{ isRecords }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"My Records\" style=\"min-height:100vh; background:#FBF8F4;\">\n      <nav style=\"display:flex; align-items:center; justify-content:space-between; padding:18px 40px; background:#FFFFFF; border-bottom:1px solid #EDE8DF;\">\n        <img src=\"eb48b263-63b1-44fb-b017-02950588f16b\" alt=\"Helios\" style=\"height:24px; width:auto;\">\n        <div style=\"display:flex; align-items:center; gap:32px;\">\n          <a sc-camel-on-click=\"{{ goHome }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Home<\u002Fa>\n          <a sc-camel-on-click=\"{{ goRecords }}\" style=\"font-size:14px; font-weight:700; color:#1A2650; cursor:pointer;\">My Records<\u002Fa>\n          <a sc-camel-on-click=\"{{ goChat }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Ask Helios<\u002Fa>\n          <a sc-camel-on-click=\"{{ goMessages }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Messages<\u002Fa>\n          <a sc-camel-on-click=\"{{ goSettings }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Settings<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"width:34px; height:34px; border-radius:50%; background:#1A2650; color:#FFFFFF; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;\">SM<\u002Fdiv>\n      <\u002Fnav>\n\n      <div style=\"max-width:760px; margin:0 auto; padding:48px 24px 80px;\">\n        <h1 style=\"font-size:28px; color:#1A2650; font-weight:700; margin:0 0 6px;\">My Records<\u002Fh1>\n        <p style=\"font-size:15px; color:#5B6472; margin:0 0 32px; text-wrap:pretty;\">Everything Helios and Dr. Rossi currently have on file for you. This is read-only — if something looks off, message your doctor instead of trying to fix it here.<\u002Fp>\n\n        <!-- Profile summary -->\n        <div style=\"background:#FFFFFF; border-radius:18px; padding:24px 28px; margin-bottom:28px; display:flex; align-items:center; gap:20px; box-shadow:0 4px 16px rgba(26,38,80,0.05);\">\n          <div style=\"width:56px; height:56px; border-radius:50%; background:#1A2650; color:#FFFFFF; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; flex-shrink:0;\">SM<\u002Fdiv>\n          <div>\n            <p style=\"margin:0 0 4px; font-size:18px; font-weight:700; color:#1A2650;\">Sarah Mitchell<\u002Fp>\n            <p style=\"margin:0; font-size:14px; color:#8A9099;\">34 years old · Female<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Latest labs -->\n        <p style=\"font-size:12px; font-weight:700; letter-spacing:0.06em; color:#A7A096; text-transform:uppercase; margin:0 0 14px;\">Latest labs<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:32px;\">\n          <sc-for list=\"{{ myLabs }}\" as=\"lab\" hint-placeholder-count=\"4\">\n            <div style=\"background:#FFFFFF; border-radius:16px; padding:18px 20px; box-shadow:0 4px 16px rgba(26,38,80,0.05);\">\n              <p style=\"margin:0 0 8px; font-size:13px; color:#8A9099;\">{{ lab.label }}<\u002Fp>\n              <p style=\"margin:0 0 6px; font-size:19px; font-weight:700; color:#1A2650;\">{{ lab.value }}<\u002Fp>\n              <p style=\"margin:0 0 10px; font-size:12px; color:#A7A096;\">{{ lab.date }}<\u002Fp>\n              <span style=\"display:inline-block; font-size:11px; font-weight:600; color:{{ lab.tagColor }}; background:{{ lab.tagBg }}; padding:4px 10px; border-radius:20px;\">{{ lab.tag }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- Clinical history -->\n        <p style=\"font-size:12px; font-weight:700; letter-spacing:0.06em; color:#A7A096; text-transform:uppercase; margin:0 0 14px;\">Clinical history<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:16px;\">\n          <sc-for list=\"{{ myConditions }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"background:#FFFFFF; border-radius:14px; padding:16px 20px; box-shadow:0 2px 8px rgba(26,38,80,0.04);\">\n              <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:4px;\">\n                <p style=\"margin:0; font-size:14px; font-weight:700; color:#1A2650;\">{{ c.title }}<\u002Fp>\n                <span style=\"font-size:12px; color:#A7A096; white-space:nowrap;\">{{ c.date }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"margin:0 0 6px; font-size:13px; color:#5B6472; line-height:1.6;\">{{ c.desc }}<\u002Fp>\n              <span style=\"font-size:11px; color:#8A9099;\">{{ c.source }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasMoreHistory }}\" hint-placeholder-val=\"{{ true }}\">\n          <button sc-camel-on-click=\"{{ toggleHistory }}\" style=\"background:none; border:none; color:#1FB6C1; font-size:13px; font-weight:700; cursor:pointer; padding:6px 0 32px; text-align:left;\">{{ historyToggleLabel }}<\u002Fbutton>\n        <\u002Fsc-if>\n\n        <!-- Uploaded documents -->\n        <p style=\"font-size:12px; font-weight:700; letter-spacing:0.06em; color:#A7A096; text-transform:uppercase; margin:0 0 14px;\">My uploaded documents<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <sc-for list=\"{{ myDocumentsView }}\" as=\"doc\" hint-placeholder-count=\"2\">\n            <div style=\"background:#FFFFFF; border-radius:14px; box-shadow:0 2px 8px rgba(26,38,80,0.04); overflow:hidden;\">\n              <div sc-camel-on-click=\"{{ doc.onToggle }}\" style=\"cursor:pointer; padding:16px 20px; display:flex; align-items:center; gap:14px;\">\n                <div style=\"width:36px; height:36px; border-radius:10px; background:#F0EEE7; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;\">📄<\u002Fdiv>\n                <div style=\"flex:1;\">\n                  <p style=\"margin:0; font-size:14px; font-weight:700; color:#1A2650;\">{{ doc.name }}<\u002Fp>\n                  <p style=\"margin:2px 0 0; font-size:12px; color:#8A9099;\">{{ doc.date }}<\u002Fp>\n                <\u002Fdiv>\n                <span style=\"font-size:12px; font-weight:600; color:#128089; background:#E7F8FA; padding:5px 12px; border-radius:20px;\">{{ doc.status }}<\u002Fspan>\n                <span style=\"color:#A7A096; font-size:14px;\">{{ doc.chevron }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ doc.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:0 20px 18px 70px;\">\n                  <p style=\"margin:0 0 8px; font-size:12px; font-weight:700; color:#8A9099; text-transform:uppercase; letter-spacing:0.04em;\">What we found and where it went<\u002Fp>\n                  <div style=\"display:flex; flex-direction:column; gap:6px;\">\n                    <sc-for list=\"{{ doc.extracted }}\" as=\"line\" hint-placeholder-count=\"2\">\n                      <p style=\"margin:0; font-size:13px; color:#3E4552; line-height:1.6;\">• {{ line }}<\u002Fp>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ UPLOAD ============ -->\n  <sc-if value=\"{{ isUpload }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Document Upload\" style=\"min-height:100vh; background:#FBF8F4;\">\n      <nav style=\"display:flex; align-items:center; justify-content:space-between; padding:18px 40px; background:#FFFFFF; border-bottom:1px solid #EDE8DF;\">\n        <img src=\"eb48b263-63b1-44fb-b017-02950588f16b\" alt=\"Helios\" style=\"height:24px; width:auto;\">\n        <div style=\"display:flex; align-items:center; gap:32px;\">\n          <a sc-camel-on-click=\"{{ goHome }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Home<\u002Fa>\n          <a sc-camel-on-click=\"{{ goRecords }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">My Records<\u002Fa>\n          <a sc-camel-on-click=\"{{ goChat }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Ask Helios<\u002Fa>\n          <a sc-camel-on-click=\"{{ goMessages }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Messages<\u002Fa>\n          <a sc-camel-on-click=\"{{ goSettings }}\" style=\"font-size:14px; font-weight:500; color:#5B6472; cursor:pointer;\">Settings<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"width:34px; height:34px; border-radius:50%; background:#1A2650; color:#FFFFFF; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;\">SM<\u002Fdiv>\n      <\u002Fnav>\n\n      <div style=\"max-width:640px; margin:0 auto; padding:48px 24px;\">\n        <a sc-camel-on-click=\"{{ goHome }}\" style=\"font-size:13px; color:#8A9099; cursor:pointer;\">← Back to home<\u002Fa>\n        <h1 style=\"font-size:28px; color:#1A2650; font-weight:700; margin:14px 0 8px;\">Upload a document<\u002Fh1>\n        <p style=\"font-size:15px; color:#5B6472; margin:0 0 32px;\">Lab results, imaging reports, or discharge letters — as a PDF.<\u002Fp>\n\n        <sc-if value=\"{{ isUploadIdle }}\" hint-placeholder-val=\"{{ true }}\">\n          <div sc-camel-on-click=\"{{ startUpload }}\" style=\"cursor:pointer; background:#FFFFFF; border:2px dashed #D9D2C4; border-radius:20px; padding:56px 24px; text-align:center;\">\n            <div style=\"font-size:34px; margin-bottom:14px;\">📄<\u002Fdiv>\n            <p style=\"margin:0 0 4px; font-size:16px; font-weight:700; color:#1A2650;\">Drag a PDF here, or click to choose a file<\u002Fp>\n            <p style=\"margin:0; font-size:13px; color:#8A9099;\">PDF only · up to 25MB<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isUploading }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#FFFFFF; border-radius:20px; padding:40px 32px;\">\n            <p style=\"margin:0 0 18px; font-size:15px; font-weight:700; color:#1A2650;\">Uploading Blood_Panel_Jul2026.pdf…<\u002Fp>\n            <div style=\"height:8px; background:#F0EEE7; border-radius:4px; overflow:hidden;\">\n              <div style=\"height:100%; width:{{ uploadProgress }}%; background:#1FB6C1; border-radius:4px; transition:width 0.25s ease;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"margin:12px 0 0; font-size:13px; color:#8A9099;\">{{ uploadProgress }}%<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isProcessing }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#FFFFFF; border-ra 12px; font-weight:600; color:#5B6472; background:#F0F2F5; padding:5px 12px; border-radius:20px;\">{{ p.status }}<\u002Fspan>\n              <sc-if value=\"{{ p.badge }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"font-size:12px; font-weight:700; color:#128089; background:#E7F8FA; padding:5px 12px; border-radius:20px; display:flex; align-items:center; gap:5px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#1FB6C1;\"><\u002Fspan>{{ p.badge }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ PHYSICIAN: PATIENT RECORD (with provenance + pending review) ============ -->\n  <sc-if value=\"{{ isRecord }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Physician — Patient Record\" style=\"min-height:100vh; background:#F4F6F8;\">\n      <nav style=\"display:flex; align-items:center; justify-content:space-between; padding:16px 40px; background:#FFFFFF; border-bottom:1px solid #E7EAEE;\">\n        <img src=\"eb48b263-63b1-44fb-b017-02950588f16b\" alt=\"Helios\" style=\"height:24px; width:auto;\">\n        <a sc-camel-on-click=\"{{ goCohort }}\" style=\"font-size:13px; color:#8A9099; cursor:pointer;\">← Back to cohort<\u002Fa>\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <div style=\"width:32px; height:32px; border-radius:50%; background:#1A2650; color:#FFFFFF; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;\">DR<\u002Fdiv>\n          <span style=\"font-size:14px; color:#1A2650; font-weight:500;\">Dr. Rossi<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fnav>\n      <div style=\"max-width:820px; margin:0 auto; padding:40px 24px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:24px;\">\n          <h1 style=\"font-size:24px; color:#1A2650; font-weight:700; margin:0;\">Sarah Mitchell<\u002Fh1>\n          <span style=\"font-size:12px; font-weight:700; color:#128089; background:#E7F8FA; padding:5px 12px; border-radius:20px; display:flex; align-items:center; gap:5px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#1FB6C1;\"><\u002Fspan>New upload · Jul 12<\u002Fspan>\n        <\u002Fdiv>\n\n        <p style=\"font-size:12px; font-weight:700; letter-spacing:0.06em; color:#8A9099; text-transform:uppercase; margin:0 0 12px;\">Labs — updated from patient upload<\u002Fp>\n        <div style=\"background:#FFFFFF; border-radius:14px; padding:8px 20px; margin-bottom:28px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid #F0F2F5;\">\n            <span style=\"font-size:14px; color:#3E4552;\">Glucose<\u002Fspan>\n            <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"font-size:14px; font-weight:700; color:#1A2650;\">83.0 mg/dL<\u002Fspan><span style=\"font-size:11px; color:#8A9099; background:#F0F2F5; padding:3px 9px; border-radius:10px;\">from patient upload<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 0;\">\n            <span style=\"font-size:14px; color:#3E4552;\">HbA1c<\u002Fspan>\n            <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"font-size:14px; font-weight:700; color:#1A2650;\">6.2%<\u002Fspan><span style=\"font-size:11px; color:#8A9099; background:#F0F2F5; padding:3px 9px; border-radius:10px;\">from patient upload<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <p style=\"font-size:12px; font-weight:700; letter-spacing:0.06em; color:#8A9099; text-transform:uppercase; margin:0 0 12px;\">Pending review<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <sc-for list=\"{{ pendingFields }}\" as=\"f\" hint-placeholder-count=\"2\">\n            <div style=\"background:#FDF3E2; border-radius:14px; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px;\">\n              <div>\n                <p style=\"margin:0 0 3px; font-size:14px; font-weight:700; color:#1A2650;\">{{ f.label }} · {{ f.value }}<\u002Fp>\n                <p style=\"margin:0; font-size:12px; color:#A9701F;\">{{ f.reason }} · {{ f.source }}<\u002Fp>\n              <\u002Fdiv>\n              <button style=\"flex-shrink:0; padding:9px 16px; border-radius:10px; border:1px solid #E9C583; background:#FFFFFF; color:#A9701F; font-size:12px; font-weight:700; cursor:pointer;\">Review<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ DEV / PROTOTYPE NAV ============ -->\n  <div style=\"position:fixed; bottom:20px; left:20px; z-index:100;\">\n    <sc-if value=\"{{ devNavOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#1A2650; border-radius:16px; padding:14px; margin-bottom:10px; box-shadow:0 12px 40px rgba(0,0,0,0.3); display:flex; flex-direction:column; gap:4px; width:230px; max-height:60vh; overflow-y:auto;\">\n        <p style=\"margin:0 0 6px; font-size:11px; font-weight:700; color:#7C86AC; text-transform:uppercase; letter-spacing:0.06em; padding:0 8px;\">Patient portal<\u002Fp>\n        <button sc-camel-on-click=\"{{ goAuth }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">Auth<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goOnboarding }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">Onboarding &amp; consent<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goHome }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">Home<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goRecords }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">My Records<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goChat }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">Ask Helios<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goUpload }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">Upload document<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goMessages }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">Messages<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goSettings }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">Settings<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goEmail }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">Email notification<\u002Fbutton>\n        <p style=\"margin:10px 0 6px; font-size:11px; font-weight:700; color:#7C86AC; text-transform:uppercase; letter-spacing:0.06em; padding:0 8px;\">Physician side<\u002Fp>\n        <button sc-camel-on-click=\"{{ goCohort }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">Patient cohort<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goRecord }}\" style=\"text-align:left; background:none; border:none; color:#FFFFFF; font-size:13px; padding:8px; border-radius:8px; cursor:pointer;\">Patient record<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <button sc-camel-on-click=\"{{ toggleDevNav }}\" style=\"width:48px; height:48px; border-radius:50%; border:none; background:#1FB6C1; color:#FFFFFF; font-size:20px; cursor:pointer; box-shadow:0 8px 24px rgba(31,182,193,0.4);\">☰<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'auth',\n    authMode: 'login',\n    consentML: true,\n    showConfirmModal: false,\n    uploadStage: 'idle',\n    uploadProgress: 0,\n    messages: [\n      { from: 'doctor', text: \"Hi Sarah, following up after your last scan — how are you feeling this week?\", time: 'Jul 10, 9:14 AM' },\n      { from: 'patient', text: \"A bit tired but managing okay. Should I still take the medication before the next appointment?\", time: 'Jul 10, 2:47 PM' },\n      { from: 'doctor', text: \"Yes, please continue as prescribed. We'll review everything together on the 18th.\", time: 'Jul 11, 8:02 AM' }\n    ],\n    composeText: '',\n    devNavOpen: false,\n    historyExpanded: false,\n    selectedDocId: null,\n    chatInput: '',\n    chatMessages: [\n      { kind: 'user', text: \"What does an elevated HbA1c mean?\" },\n      { kind: 'info', text: \"HbA1c reflects your average blood sugar over the past 2–3 months. Guidelines generally use levels above 6.5% as a diabetes threshold.\", source: 'ADA Standards of Care, 2024' },\n      { kind: 'user', text: \"Is coffee okay with my medication?\" },\n      { kind: 'info', text: \"Moderate coffee (1–2 cups/day) has no known interaction with your current chemotherapy regimen — fine to continue in moderation.\", source: 'NCCN Supportive Care Guidelines', dataUsed: 'Based on your current medications (AC-T regimen).' },\n      { kind: 'user', text: \"I've had a dull ache in my side since yesterday, is that normal?\" },\n      { kind: 'redirect', text: \"That's something best discussed with your doctor, since it depends on things specific to you. I've flagged this so you can send it to them directly — want me to start that message?\", originalText: \"I've had a dull ache in my side since yesterday, is that normal?\" },\n    ],\n  };\n\n  _progressTimer = null;\n\n  goTo = (screen) => this.setState({ screen });\n\n  startUpload = () => {\n    this.setState({ uploadStage: 'uploading', uploadProgress: 0 });\n    this._progressTimer = setInterval(() => {\n      this.setState((s) => {\n        const next = Math.min(100, s.uploadProgress + 20);\n        if (next >= 100) {\n          clearInterval(this._progressTimer);\n          setTimeout(() => this.setState({ uploadStage: 'processing' }), 300);\n          setTimeout(() => this.setState({ uploadStage: 'done' }), 2200);\n        }\n        return { uploadProgress: next };\n      });\n    }, 250);\n  };\n\n  resetUpload = () => this.setState({ uploadStage: 'idle', uploadProgress: 0 });\n\n  toggleML = () => {\n    if (this.state.consentML) {\n      this.setState({ showConfirmModal: true });\n    } else {\n      this.setState({ consentML: true });\n    }\n  };\n  confirmMLoff = () => this.setState({ consentML: false, showConfirmModal: false });\n  cancelMLoff = () => this.setState({ showConfirmModal: false });\n\n  updateCompose = (e) => this.setState({ composeText: e.target.value });\n  sendMessage = () => {\n    const text = this.state.composeText.trim();\n    if (!text) return;\n    this.setState((s) => ({\n      messages: [...s.messages, { from: 'patient', text, time: 'Just now' }],\n      composeText: '',\n    }));\n  };\n\n  toggleDevNav = () => this.setState((s) => ({ devNavOpen: !s.devNavOpen }));\n\n  toggleHistory = () => this.setState((s) => ({ historyExpanded: !s.historyExpanded }));\n  toggleDoc = (id) => this.setState((s) => ({ selectedDocId: s.selectedDocId === id ? null : id }));\n\n  updateChatInput = (e) => this.setState({ chatInput: e.target.value });\n\n  classifyChat = (text) => {\n    const t = text.toLowerCase();\n    const emergencyWords = ['chest pain', \"can't breathe\", 'cant breathe', 'suicid', 'kill myself', 'overdose', 'severe bleeding', 'not breathing'];\n    const symptomWords = ['i feel', \"i've had\", 'i have had', 'is it normal', 'should i be worried', 'is that normal', 'hurts', 'pain', 'ache', 'dizzy', 'nausea', 'swelling', 'worried about', 'since yesterday', 'since last', 'symptom'];\n    if (emergencyWords.some((w) => t.includes(w))) return 'emergency';\n    if (symptomWords.some((w) => t.includes(w))) return 'redirect';\n    return 'info';\n  };\n\n  sendChatMessage = () => {\n    const text = this.state.chatInput.trim();\n    if (!text) return;\n    const kind = this.classifyChat(text);\n    let reply;\n    if (kind === 'emergency') {\n      reply = { kind: 'emergency', text: \"I hear you, and this sounds urgent — I'm not able to help assess it, so please get help right away.\" };\n    } else if (kind === 'redirect') {\n      reply = { kind: 'redirect', text: \"That's something best discussed with your doctor, since it depends on things specific to you. I've flagged this so you can send it to them directly — want me to start that message?\", originalText: text };\n    } else {\n      reply = { kind: 'info', text: \"Here's general, literature-backed information on that — for anything specific to your own case, your care team is the best source.\", source: 'ESMO Patient Guidelines' };\n    }\n    this.setState((s) => ({\n      chatMessages: [...s.chatMessages, { kind: 'user', text }, reply],\n      chatInput: '',\n    }));\n  };\n\n  startMessageFromChat = (text) => {\n    this.setState({ composeText: text, screen: 'messages' });\n  };\n\n  componentWillUnmount() {\n    if (this._progressTimer) clearInterval(this._progressTimer);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const msgs = s.messages.map((m) => ({\n      ...m,\n      align: m.from === 'patient' ? 'flex-end' : 'flex-start',\n      bg: m.from === 'patient' ? '#1A2650' : '#FFFFFF',\n      color: m.from === 'patient' ? '#FFFFFF' : '#1A2650',\n    }));\n\n    const vals = {\n      isAuth: s.screen === 'auth',\n      isOnboarding: s.screen === 'onboarding',\n      isHome: s.screen === 'home',\n      isUpload: s.screen === 'upload',\n      isMessages: s.screen === 'messages',\n      isSettings: s.screen === 'settings',\n      isEmail: s.screen === 'email',\n      isCohort: s.screen === 'cohort',\n      isRecord: s.screen === 'record',\n      isRecords: s.screen === 'records',\n      isChat: s.screen === 'chat',\n\n      authMode: s.authMode,\n      loginTabBg: s.authMode === 'login' ? '#FFFFFF' : 'transparent',\n      loginTabColor: s.authMode === 'login' ? '#1A2650' : '#8A9099',\n      signupTabBg: s.authMode === 'signup' ? '#FFFFFF' : 'transparent',\n      signupTabColor: s.authMode === 'signup' ? '#1A2650' : '#8A9099',\n      authCta: s.authMode === 'login' ? 'Log in' : 'Create account',\n      setLogin: () => this.setState({ authMode: 'login' }),\n      setSignup: () => this.setState({ authMode: 'signup' }),\n\n      goAuth: () => this.goTo('auth'),\n      goOnboarding: () => this.goTo('onboarding'),\n      goHome: () => this.goTo('home'),\n      goUpload: () => this.goTo('upload'),\n      goMessages: () => this.goTo('messages'),\n      goSettings: () => this.goTo('settings'),\n      goEmail: () => this.goTo('email'),\n      goCohort: () => this.goTo('cohort'),\n      goRecord: () => this.goTo('record'),\n      goRecords: () => this.goTo('records'),\n      goChat: () => this.goTo('chat'),\n      chatInput: s.chatInput,\n      updateChatInput: this.updateChatInput,\n      sendChatMessage: this.sendChatMessage,\n      chatMessages: s.chatMessages.map((m) => ({\n        ...m,\n        isUser: m.kind === 'user',\n        isInfo: m.kind === 'info',\n        isRedirect: m.kind === 'redirect',\n        isEmergency: m.kind === 'emergency',\n        onStartMessage: m.kind === 'redirect' ? () => this.startMessageFromChat(m.originalText) : undefined,\n      })),\n\n      consentML: s.consentML,\n      toggleML: this.toggleML,\n      toggleBg: s.consentML ? '#1FB6C1' : '#D9D2C4',\n      toggleLeft: s.consentML ? '23px' : '3px',\n      showConfirmModal: s.showConfirmModal,\n      confirmMLoff: this.confirmMLoff,\n      cancelMLoff: this.cancelMLoff,\n\n      uploadStage: s.uploadStage,\n      isUploadIdle: s.uploadStage === 'idle',\n      isUploading: s.uploadStage === 'uploading',\n      isProcessing: s.uploadStage === 'processing',\n      isUploadDone: s.uploadStage === 'done',\n      uploadProgress: s.uploadProgress,\n      startUpload: this.startUpload,\n      resetUpload: this.resetUpload,\n\n      messages: msgs,\n      composeText: s.composeText,\n      updateCompose: this.updateCompose,\n      sendMessage: this.sendMessage,\n\n      devNavOpen: s.devNavOpen,\n      toggleDevNav: this.toggleDevNav,\n\n      cohortPatients: [\n        { initials: 'SM', name: 'Sarah Mitchell', age: 34, sex: 'Female', dx: 'Breast cancer — Luminal B', status: 'Active review', badge: 'New upload' },\n        { initials: 'PN', name: 'Priya Nair', age: 52, sex: 'Female', dx: 'Ovarian cancer — Stage IIIA', status: 'Active review', badge: 'New message' },\n        { initials: 'JO', name: 'James Okoro', age: 61, sex: 'Male', dx: 'Prostate — monitoring', status: 'Stable', badge: null },\n      ],\n      pendingFields: [\n        { label: 'CA-125', value: '142 U/mL', reason: 'Outlier vs. prior trend (was 38 U/mL)', source: 'Patient upload · Jul 12' },\n        { label: 'Hemoglobin', value: '9.8 g/dL', reason: 'Contradicts last clinic result (12.4 g/dL)', source: 'Patient upload · Jul 12' },\n      ],\n\n      historyExpanded: s.historyExpanded,\n      toggleHistory: this.toggleHistory,\n      toggleDoc: this.toggleDoc,\n\n      myLabs: [\n        { label: 'Blood sugar (Glucose)', value: '83.0 mg/dL', date: 'Jul 12, 2026', tag: 'Added from your upload, Jul 12', soft: false },\n        { label: 'Long-term blood sugar (HbA1c)', value: '6.2%', date: 'Jul 12, 2026', tag: 'Added from your upload, Jul 12', soft: false },\n        { label: 'Tumor marker (CA-125)', value: '142 U/mL', date: 'Jul 12, 2026', tag: 'Being reviewed by your care team', outOfRange: true, soft: true },\n        { label: 'Complete blood count', value: 'Within typical range', date: 'May 23, 2026', tag: 'Added by your care team', soft: false },\n      ],\n\n      myConditionsAll: [\n        { date: 'Jul 12, 2026', title: 'Blood test reviewed', desc: 'Your recent blood work was added to your record.', source: 'From your upload · Blood_Panel_Jul2026.pdf' },\n        { date: 'May 26, 2026', title: 'Treatment plan discussed', desc: 'Dr. Rossi outlined a recommended treatment approach based on your recent scans and test results.', source: 'Added by your care team' },\n        { date: 'May 25, 2026', title: 'Biopsy results reviewed', desc: 'A tissue sample was examined to better understand the finding in your recent scan.', source: 'Added by your care team' },\n        { date: 'May 24, 2026', title: 'Additional blood markers checked', desc: 'Extra blood markers were checked to help guide your care.', source: 'Added by your care team' },\n        { date: 'May 22, 2026', title: 'Imaging completed', desc: 'An MRI and a CT scan were performed to get a clearer picture.', source: 'Added by your care team' },\n        { date: 'May 20, 2026', title: 'First visit with Dr. Rossi', desc: 'You met with Dr. Rossi to discuss a finding and next steps.', source: 'Added by your care team' },\n      ],\n\n      myDocuments: [\n        {\n          id: 'doc1', name: 'Blood_Panel_Jul2026.pdf', date: 'Jul 12, 2026', status: 'Processed',\n          extracted: ['Blood sugar (Glucose) → 83.0 mg/dL', 'Long-term blood sugar (HbA1c) → 6.2%', 'Tumor marker (CA-125) → being reviewed by your care team'],\n        },\n        {\n          id: 'doc2', name: 'Discharge_Summary_May2026.pdf', date: 'May 20, 2026', status: 'Processed',\n          extracted: ['Added a visit summary to your clinical history'],\n        },\n      ],\n    };\n\n    vals.myConditions = vals.historyExpanded ? vals.myConditionsAll : vals.myConditionsAll.slice(0, 3);\n    vals.hasMoreHistory = vals.myConditionsAll.length > 3;\n    vals.historyToggleLabel = vals.historyExpanded ? 'Show less' : 'Show full history';\n    vals.myLabs = vals.myLabs.map((l) => ({\n      ...l,\n      tagColor: l.soft ? '#A9701F' : '#8A9099',\n      tagBg: l.soft ? '#FDF3E2' : '#F0F2F5',\n    }));\n    vals.myDocumentsView = vals.myDocuments.map((d) => ({\n      ...d,\n      expanded: s.selectedDocId === d.id,\n      chevron: s.selectedDocId === d.id ? '▲' : '▼',\n      onToggle: () => this.toggleDoc(d.id),\n    }));\n    return vals;\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
